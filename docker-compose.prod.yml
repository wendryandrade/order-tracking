# Docker Compose para CI/CD e Produção (tudo containerizado)
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ordertracking-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - ordertracking-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ordertracking-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ordertracking-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: src/OrderTracking.Api/Dockerfile
    container_name: ordertracking-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=OrderTrackingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - RabbitMQ__HostName=rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ordertracking-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: src/OrderTracking.Worker/Dockerfile
    container_name: ordertracking-worker
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=OrderTrackingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - RabbitMQ__HostName=rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ordertracking-network
    restart: unless-stopped

  web:
    build:
      context: src/OrderTracking.Web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: ordertracking-web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - ordertracking-network
    restart: unless-stopped

networks:
  ordertracking-network:
    driver: bridge

volumes:
  sqlserver_data:
  rabbitmq_data:
