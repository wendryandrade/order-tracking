name: CI/CD Pipeline - Docker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # Job 1: Build e Teste do Backend .NET
  build-and-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 📦 Restore dependencies
      run: dotnet restore

    - name: 🔨 Build
      run: dotnet build --no-restore --configuration Release

    - name: 🧪 Run Tests
      run: dotnet test tests/OrderTracking.Tests/OrderTracking.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: 📊 Publish Test Results
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: .NET Tests
        path: '**/test-results.trx'
        reporter: dotnet-trx
        fail-on-error: true

  # Job 2: Build Frontend React/Vite
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/OrderTracking.Web/package-lock.json

    - name: 📦 Install dependencies
      working-directory: src/OrderTracking.Web
      run: npm ci

    - name: 🔨 Build Frontend
      working-directory: src/OrderTracking.Web
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000' }}

  # Job 3: Build e Push Docker Images (apenas main)
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        include:
          - service: api
            context: .
            dockerfile: src/OrderTracking.Api/Dockerfile
            image: ordertracking-api
          - service: worker
            context: .
            dockerfile: src/OrderTracking.Worker/Dockerfile
            image: ordertracking-worker
          - service: web
            context: src/OrderTracking.Web
            dockerfile: src/OrderTracking.Web/Dockerfile
            image: ordertracking-web

    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4

    - name: 🐳 Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: 🔨 Build and Push ${{ matrix.service }} Image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: 📋 Image Summary
      run: |
        echo "### 🐳 Docker Image Built Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Service:** ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
        echo "**Image:** \`${{ env.IMAGE_PREFIX }}/${{ matrix.image }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  # Job 4: Notificação de Sucesso
  success-notification:
    name: Pipeline Success
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: success()

    steps:
    - name: ✅ Pipeline Completed
      run: |
        echo "### 🎉 CI/CD Pipeline Completed Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🐳 Docker Images Published:" >> $GITHUB_STEP_SUMMARY
        echo "- \`${{ env.IMAGE_PREFIX }}/ordertracking-api:latest\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`${{ env.IMAGE_PREFIX }}/ordertracking-worker:latest\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`${{ env.IMAGE_PREFIX }}/ordertracking-web:latest\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🚀 Deploy:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "docker-compose pull" >> $GITHUB_STEP_SUMMARY
        echo "docker-compose up -d" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
