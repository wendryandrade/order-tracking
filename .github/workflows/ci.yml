name: CI - Build & Test

on:
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Análise de código .NET
  code-analysis:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 🔍 Restore
      run: dotnet restore

    - name: 🔨 Build
      run: dotnet build --no-restore --configuration Debug

    - name: 🔎 Run Code Analysis
      run: dotnet format --verify-no-changes --verbosity diagnostic

  # Backend: Build e Testes
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 📦 Restore
      run: dotnet restore

    - name: 🔨 Build
      run: dotnet build --no-restore --configuration Release

    - name: 🧪 Run Tests with Coverage
      run: |
        dotnet test tests/OrderTracking.Tests/OrderTracking.Tests.csproj \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage

    - name: 📊 Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage/**/coverage.cobertura.xml
        badge: true
        fail_below_min: false
        format: markdown
        hide_branch_rate: false
        hide_complexity: false
        indicators: true
        output: both
        thresholds: '60 80'

    - name: 📝 Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md

  # Frontend: Build e Lint
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/OrderTracking.Web/package-lock.json

    - name: 📦 Install dependencies
      working-directory: src/OrderTracking.Web
      run: npm ci

    - name: 🔨 Build
      working-directory: src/OrderTracking.Web
      run: npm run build

    - name: 📏 Check bundle size
      working-directory: src/OrderTracking.Web
      run: |
        echo "📦 Build size:"
        du -sh dist/
        du -sh dist/assets/

  # Docker: Validar Dockerfiles
  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔨 Build API Image (validation)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/OrderTracking.Api/Dockerfile
        push: false
        tags: ordertracking-api:test

    - name: 🔨 Build Consumer Image (validation)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/OrderTracking.Worker/Dockerfile
        push: false
        tags: ordertracking-worker:test

    - name: 🔨 Build Web Image (validation)
      uses: docker/build-push-action@v5
      with:
        context: src/OrderTracking.Web
        file: src/OrderTracking.Web/Dockerfile
        push: false
        tags: ordertracking-web:test

  # Status final
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [code-analysis, backend-tests, frontend-quality, docker-validation]
    if: success()

    steps:
    - name: ✅ All Checks Passed
      run: echo "🎉 All CI checks passed successfully!"
