name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Version tag to deploy (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔐 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 📦 Pull Latest Images
      run: |
        docker pull ${{ env.IMAGE_PREFIX }}/ordertracking-api:${{ github.event.inputs.version }}
        docker pull ${{ env.IMAGE_PREFIX }}/ordertracking-worker:${{ github.event.inputs.version }}
        docker pull ${{ env.IMAGE_PREFIX }}/ordertracking-web:${{ github.event.inputs.version }}

    - name: ✅ Verify Images
      run: |
        docker images | grep ordertracking

    - name: 📋 Deployment Summary
      run: |
        echo "### 🚀 Deployment Initiated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🐳 Images Deployed:" >> $GITHUB_STEP_SUMMARY
        echo "- \`${{ env.IMAGE_PREFIX }}/ordertracking-api:${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`${{ env.IMAGE_PREFIX }}/ordertracking-worker:${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- \`${{ env.IMAGE_PREFIX }}/ordertracking-web:${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📝 Next Steps:" >> $GITHUB_STEP_SUMMARY
        echo "1. SSH to server" >> $GITHUB_STEP_SUMMARY
        echo "2. Run: \`docker-compose -f docker-compose.prod.yml pull\`" >> $GITHUB_STEP_SUMMARY
        echo "3. Run: \`docker-compose -f docker-compose.prod.yml up -d\`" >> $GITHUB_STEP_SUMMARY
        echo "4. Verify: \`docker-compose ps\`" >> $GITHUB_STEP_SUMMARY

